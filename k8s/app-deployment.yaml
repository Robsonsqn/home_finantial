apiVersion: apps/v1
kind: Deployment
metadata:
  name: moneymoney-app
  labels:
    app: moneymoney
spec:
  replicas: 4 
  selector:
    matchLabels:
      app: moneymoney
  template:
    metadata:
      labels:
        app: moneymoney
    spec:
      containers:
        - name: moneymoney-container
          image: robsonsqn/moneymoney:latest 
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/moneymoney_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "moneymoney_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "secret"
              
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
            
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1 
            failureThreshold: 3 
